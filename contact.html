<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Recipe | JuiceHub</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="https://cdn-icons-png.flaticon.com/512/5825/5825340.png" alt="JuiceHub Logo"
                    class="navbar-logo">
                JuiceHub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="recipes.html">Recipes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Submit Recipe</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="section-title">
                        <h2>Join Our Community</h2>
                        <p>Share your favorite healthy blends with us.</p>
                    </div>
                    <div class="glass-form shadow">
                        <form id="submissionForm" novalidate>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="userName" placeholder="John Doe"
                                        required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="userEmail"
                                        placeholder="john@example.com" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Recipe Title</label>
                                    <input type="text" class="form-control" id="recipeTitle"
                                        placeholder="The Morning Glow" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Category</label>
                                    <select class="form-select" id="recipeCategory" required>
                                        <option value="" selected disabled>Choose category...</option>
                                        <option value="fruit">Fruit Juice</option>
                                        <option value="smoothie">Smoothie</option>
                                        <option value="vegetable">Vegetable Juice</option>
                                        <option value="detox">Detox Drink</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Image URL</label>
                                    <input type="url" class="form-control" id="recipeImage"
                                        placeholder="https://image-url.com" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Ingredients (One per line)</label>
                                    <textarea class="form-control" id="recipeIngredients" rows="3"
                                        placeholder="Watermelon&#10;Lime" required></textarea>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Instructions</label>
                                    <textarea class="form-control" id="recipeInstructions" rows="4"
                                        placeholder="Step 1: Blend..." required></textarea>
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-submit btn-lg px-5">Submit Recipe</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-5 border-0 rounded-4">
                <div class="mb-3"><i class="fas fa-check-circle text-success fa-5x"></i></div>
                <h2 class="fw-bold">Success!</h2>
                <p class="text-muted">Your recipe is now available in the collection.</p>
                <button type="button" class="btn btn-success rounded-pill px-4" data-bs-dismiss="modal">Awesome</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 JuiceHub Digital Recipe Book. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
